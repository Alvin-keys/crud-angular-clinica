<div class="container">

    <h2>Pacientes</h2>

    <button (click)="novoPaciente()">
    + Novo Paciente
</button>

<br><br>

    <!-- FORMULÁRIO -->
    <div class="form">

        <input type="text" placeholder="Nome" [(ngModel)]="paciente.nome">
        <input type="text" placeholder="Email" [(ngModel)]="paciente.email">
        <input type="text" placeholder="Telefone" [(ngModel)]="paciente.telefone">
        <input type="date" [(ngModel)]="paciente.dataPrimeiraConsulta">

        <button (click)="salvar()">
            Salvar
        </button>

        <button (click)="limpar()">
            Limpar
        </button>

    </div>

    <hr>

    <!-- TABELA -->
    <table border="1" width="100%">

        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Data</th>
            <th>Ações</th>
        </tr>

        <tr *ngFor="let p of pacientes">
            <td>
                <span style="color:blue; cursor:pointer" (click)="verConsultas(p)">
                    {{ p.nome }}
                </span>
            </td>
            <td>{{ p.email }}</td>
            <td>{{ p.telefone }}</td>
            <td>{{ p.dataPrimeiraConsulta }}</td>
            <td>
                <button (click)="verConsultas(p)">Ver consultas</button>
                <button (click)="excluir(p.id!)">Excluir</button>
            </td>
        </tr>

    </table>

    <hr>

    <h3>Consultas de {{ pacienteSelecionadoNome }}</h3>

    <table border="1" width="100%">

        <tr>
            <th>Data</th>
            <th>Observações</th>
        </tr>

        <tr *ngFor="let c of consultasPaciente">
            <td>{{ c.dataConsulta }}</td>
            <td>{{ c.observacoes }}</td>
        </tr>

    </table>

    <hr>


</div>
