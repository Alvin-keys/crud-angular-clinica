<mat-card>

  <mat-card-title>Lista de Clientes</mat-card-title>

  <mat-card-content>

    <table mat-table [dataSource]="clientes" class="mat-elevation-z8">

      <!-- Nome -->
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let cliente"> {{ cliente.nome }} </td>
      </ng-container>

      <!-- Data -->
      <ng-container matColumnDef="dataPrimeiraConsulta">
        <th mat-header-cell *matHeaderCellDef> Primeira Consulta </th>
        <td mat-cell *matCellDef="let cliente"> {{ cliente.dataPrimeiraConsulta }} </td>
      </ng-container>

      <!-- Telefone -->
      <ng-container matColumnDef="telefone">
        <th mat-header-cell *matHeaderCellDef> Telefone </th>
        <td mat-cell *matCellDef="let cliente"> {{ cliente.telefone }} </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let cliente"> {{ cliente.email }} </td>
      </ng-container>

      <!-- Ações (vamos usar já já) -->
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef> Ações </th>
        <td mat-cell *matCellDef="let cliente">
          <button mat-icon-button color="primary" (click)="editar(cliente)">
            ✏️
          </button>
          <button mat-icon-button color="warn" (click)="excluir(cliente)">
            🗑️
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>


  </mat-card-content>

</mat-card>
