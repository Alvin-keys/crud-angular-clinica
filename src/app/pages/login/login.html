<div class="login-container">

  <mat-card class="login-card">

    <mat-card-title>Entrar no Sistema</mat-card-title>

    <mat-card-content>

      <form (ngSubmit)="entrar()">

        <mat-form-field appearance="outline">
          <mat-label>Usuário</mat-label>
          <input matInput name="usuario" [(ngModel)]="usuario" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" name="senha" [(ngModel)]="senha" />
        </mat-form-field>

        <p class="erro" *ngIf="erro">{{ erro }}</p>

        <button type="submit" mat-raised-button color="primary" class="botao-entrar">
          Entrar
        </button>

      </form>

    </mat-card-content>

  </mat-card>

</div>
